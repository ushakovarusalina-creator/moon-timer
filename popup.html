<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Moon Timer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,200&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0c0a; --surface: #181512; --border: #2a2420;
    --accent: #e8603c; --accent2: #f0a06a;
    --text: #f0e8df; --muted: #6b5e54;
    --work: #e8603c; --break: #5ba88f;
  }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg); color: var(--text);
    width: 400px;
    display: flex; flex-direction: column;
    align-items: center; padding: 28px 20px 24px;
    position: relative; overflow-x: hidden;
  }
  .moon-bg {
    position: fixed; top: 50%; right: -60px;
    transform: translateY(-50%);
    width: 380px; height: 380px; border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, #3a3530 0%, #252018 30%, #1a1610 60%, #100e0b 100%);
    box-shadow: inset -30px -20px 60px rgba(0,0,0,0.8), inset 20px 15px 40px rgba(80,70,55,0.15);
    opacity: 0.2; pointer-events: none; z-index: 0;
  }
  .moon-bg::before {
    content: '';
    position: absolute; top: 18%; left: 22%;
    width: 50px; height: 50px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, transparent 70%);
    box-shadow: 70px 100px 0 16px rgba(0,0,0,0.25), 140px 50px 0 10px rgba(0,0,0,0.2),
      190px 150px 0 22px rgba(0,0,0,0.3), 35px 210px 0 12px rgba(0,0,0,0.2),
      250px 80px 0 7px rgba(0,0,0,0.15), 110px 240px 0 18px rgba(0,0,0,0.25);
  }
  body > * { position: relative; z-index: 1; }
  h1 { font-family: 'Fraunces', serif; font-size: 1.6rem; font-weight: 300; letter-spacing: -0.02em; margin-bottom: 4px; }
  .subtitle { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 24px; }
  .main-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px 28px; width: 100%; margin-bottom: 16px; }
  .mode-status { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .mode-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.2s; background: none; font-family: 'DM Mono', monospace; }
  .mode-badge.active-work  { background: rgba(232,96,60,0.15); border-color: var(--work); color: var(--work); }
  .mode-badge.active-break { background: rgba(91,168,143,0.15); border-color: var(--break); color: var(--break); }
  .timer-display { text-align: center; margin-bottom: 24px; }
  .project-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; min-height: 1em; }
  .project-label span { color: var(--accent2); }
  .ring-wrap { position: relative; width: 140px; height: 140px; margin: 0 auto 10px; }
  .ring-wrap svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
  .ring-progress { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.9s linear, stroke 0.3s; }
  .ring-time { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .time { font-family: 'Fraunces', serif; font-size: 3.8rem; font-weight: 200; font-style: italic; line-height: 1; letter-spacing: -0.04em; transition: color 0.3s; }
  .time.work  { color: var(--work); }
  .time.break { color: var(--break); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
  .time.running { animation: pulse 2s ease-in-out infinite; }
  .controls { display: flex; gap: 10px; align-items: center; justify-content: center; }
  .btn-play { width: 52px; height: 52px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 4px 20px rgba(232,96,60,0.3); }
  .btn-play:hover { transform: scale(1.06); }
  .btn-play.break-mode { background: var(--break); box-shadow: 0 4px 20px rgba(91,168,143,0.3); }
  .btn-round { width: 38px; height: 38px; border-radius: 50%; background: none; border: 1px solid var(--border); color: var(--muted); font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .btn-round:hover { border-color: var(--muted); color: var(--text); }
  .sessions { display: flex; gap: 5px; justify-content: center; margin-top: 18px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
  .dot.done { background: var(--accent); }
  .projects-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 18px 20px; width: 100%; }
  .card-title { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 14px; }
  .project-list { display: flex; flex-direction: column; gap: 5px; max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
  .project-list::-webkit-scrollbar { width: 3px; }
  .project-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .project-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 9px; cursor: pointer; transition: all 0.18s; }
  .project-item:hover { border-color: var(--muted); }
  .project-item.selected { border-color: #7c9ee8; background: rgba(124,158,232,0.07); }
  .project-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.2s; }
  .project-item.selected .project-dot { background: #7c9ee8; }
  .project-name { flex: 1; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .project-time-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: visible; position: relative; }
  .project-time-fill { height: 100%; background: #7c9ee8; border-radius: 2px; transition: width 0.5s; }
  .project-time-label { position: absolute; right: 0; top: 5px; font-size: 0.55rem; color: var(--muted); letter-spacing: 0.04em; white-space: nowrap; pointer-events: none; }
  .btn-del            { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.7rem;  padding: 2px 5px; border-radius: 4px; transition: color 0.2s; line-height: 1; }
  .btn-del:hover      { color: #e85c5c; }
  .btn-reset-time     { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.78rem; padding: 2px 4px; border-radius: 4px; transition: color 0.2s; line-height: 1; }
  .btn-reset-time:hover { color: #7c9ee8; }
  .add-form { display: flex; gap: 7px; }
  .add-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem; outline: none; transition: border-color 0.2s; }
  .add-input:focus { border-color: var(--accent); }
  .add-input::placeholder { color: var(--muted); }
  .btn-add { background: var(--accent); border: none; border-radius: 8px; padding: 8px 14px; color: white; font-family: 'DM Mono', monospace; font-size: 0.7rem; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
  .btn-add:hover { opacity: 0.85; }
  .empty-msg { text-align: center; color: var(--muted); font-size: 0.7rem; padding: 16px 0; }
  .notif { position: fixed; top: 12px; right: 12px; left: 12px; background: var(--surface); border: 1px solid var(--accent); border-radius: 10px; padding: 10px 14px; font-size: 0.75rem; transform: translateY(-80px); opacity: 0; transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; }
  .notif.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>
<div class="moon-bg"></div>
<h1>The Moon Timer</h1>
<p class="subtitle">focus · break · repeat</p>

<div class="main-card">
  <div class="mode-status">
    <button class="mode-badge" id="badge-work">● Работа</button>
    <button class="mode-badge" id="badge-break">● Перерыв</button>
  </div>
  <div class="timer-display">
    <div class="project-label" id="proj-label">Проект не выбран</div>
    <div class="ring-wrap">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle class="ring-bg" cx="70" cy="70" r="62"/>
        <circle class="ring-progress" id="ring" cx="70" cy="70" r="62" stroke-dasharray="389.6" stroke-dashoffset="389.6"/>
      </svg>
      <div class="ring-time">
        <div class="time work" id="time-display">00:00</div>
      </div>
    </div>
  </div>
  <div class="controls">
    <button class="btn-round" id="btn-reset" title="Сохранить и сбросить">↺</button>
    <button class="btn-play" id="play-btn">▶</button>
    <div style="width:38px"></div>
  </div>
  <div class="sessions" id="sessions">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<div class="projects-card">
  <div class="card-title">Проекты</div>
  <div class="project-list" id="proj-list">
    <div class="empty-msg">Нет проектов. Добавьте первый!</div>
  </div>
  <div class="add-form">
    <input class="add-input" id="proj-input" placeholder="Название проекта..." maxlength="40">
    <button class="btn-add" id="btn-add-project">+ Добавить</button>
  </div>
</div>

<div class="notif" id="notif"></div>
<script src="popup.js"></script>
</body>
</html>
